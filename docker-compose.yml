version: "3.9"

services:
  # ── MySQL Database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: apar_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: acc_system_setup
      MYSQL_USER: vespazeza
      MYSQL_PASSWORD: 64120482
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Express.js) ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apar_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: vespazeza
      DB_PASS: 64120482
      DB_NAME: acc_system_setup
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (React + Nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: apar_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
